name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: autosell-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - name: Check out AutoSell
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Check out locked private ModKit bootstrap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: abmcar/FarmTogether2-ModKit
          ref: f54dc63e4d9a5cc466a6c68f8da77c4c250f9e2c
          token: ${{ secrets.MODKIT_READ_TOKEN }}
          path: .modkit/bootstrap
          persist-credentials: false
      - name: Set up locked .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68
        with:
          global-json-file: global.json
      - name: Validate locked build inputs
        shell: pwsh
        env:
          MODKIT_COMMIT: f54dc63e4d9a5cc466a6c68f8da77c4c250f9e2c
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          if ((dotnet --version).Trim() -cne '8.0.421') {
            throw 'Exact .NET SDK 8.0.421 is required.'
          }
          $lock = Get-Content -LiteralPath 'modkit.lock.json' -Raw | ConvertFrom-Json
          if ([string]$lock.workflowCommit -cne $env:MODKIT_COMMIT) {
            throw 'modkit.lock.json workflowCommit differs from the CI bootstrap commit.'
          }
          $bootstrapHead = @(& git -C '.modkit/bootstrap' rev-parse HEAD)
          if ($LASTEXITCODE -ne 0 -or $bootstrapHead.Count -ne 1 -or $bootstrapHead[0].Trim() -cne $env:MODKIT_COMMIT) {
            throw 'ModKit bootstrap checkout differs from the locked commit.'
          }
      - name: Resolve locked ModKit package and tooling
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.MODKIT_READ_TOKEN }}
        run: |
          & gh auth setup-git --hostname github.com
          if ($LASTEXITCODE -ne 0) {
            throw "ModKit Git authentication setup failed with exit code $LASTEXITCODE."
          }
          & '.modkit/bootstrap/scripts/Resolve-ModKit.ps1' `
            -LockFile 'modkit.lock.json' `
            -Destination '.modkit/packages' `
            -PropsOutput '.modkit/generated/ModKit.lock.props'
          if ($LASTEXITCODE -ne 0) {
            throw "ModKit resolver failed with exit code $LASTEXITCODE."
          }
      - name: Verify locked package and detached tooling
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $lock = Get-Content -LiteralPath 'modkit.lock.json' -Raw | ConvertFrom-Json
          $packages = @(Get-ChildItem -LiteralPath '.modkit/packages' -File -Force)
          if ($packages.Count -ne 1 -or $packages[0].Name -cne [string]$lock.assetName) {
            throw 'Resolved package set differs from modkit.lock.json.'
          }
          $packageHash = (Get-FileHash -LiteralPath $packages[0].FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($packageHash -cne [string]$lock.sha256) {
            throw 'Resolved package SHA-256 differs from modkit.lock.json.'
          }
          $head = @(& git -C '.modkit/tooling' rev-parse HEAD)
          $branch = @(& git -C '.modkit/tooling' rev-parse --abbrev-ref HEAD)
          $status = @(& git -C '.modkit/tooling' status --porcelain --untracked-files=all)
          if ($LASTEXITCODE -ne 0 -or $head.Count -ne 1 -or $head[0].Trim() -cne [string]$lock.workflowCommit) {
            throw 'Resolved tooling HEAD differs from modkit.lock.json.'
          }
          if ($branch.Count -ne 1 -or $branch[0].Trim() -cne 'HEAD' -or $status.Count -ne 0) {
            throw 'Resolved tooling checkout is not detached and clean.'
          }
      - name: Build and test AutoSell
        shell: pwsh
        run: |
          & '.modkit/tooling/scripts/Invoke-ModBuild.ps1' `
            -RepositoryRoot '.' `
            -GameApiMode Hosted `
            -Configuration Release
          if ($LASTEXITCODE -ne 0) {
            throw "Mod build failed with exit code $LASTEXITCODE."
          }
      - name: Package candidate assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path 'artifacts' | Out-Null
          & '.modkit/tooling/scripts/Pack-Mod.ps1' `
            -RepositoryRoot '.' `
            -Configuration Release `
            -OutputDirectory 'artifacts/candidate'
          if ($LASTEXITCODE -ne 0) {
            throw "Mod packaging failed with exit code $LASTEXITCODE."
          }
      - name: Bind candidate metadata
        id: metadata
        shell: pwsh
        env:
          CANDIDATE_KIND: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'candidate' || 'preview' }}
          EXPECTED_COMMIT: ${{ github.sha }}
          EXPECTED_RUN_ID: ${{ github.run_id }}
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          $commit = @(& git rev-parse HEAD)
          if ($LASTEXITCODE -ne 0 -or $commit.Count -ne 1 -or $commit[0].Trim() -cne $env:EXPECTED_COMMIT) {
            throw 'Caller checkout differs from github.sha.'
          }
          $mod = Get-Content -LiteralPath 'mod.json' -Raw | ConvertFrom-Json
          $artifactName = "$($mod.assemblyName)-$env:CANDIDATE_KIND-$env:EXPECTED_COMMIT"
          & '.modkit/tooling/scripts/Invoke-ModKitTool.ps1' candidate write-mod `
            --directory 'artifacts/candidate' `
            --artifact-name $artifactName `
            --assembly-name ([string]$mod.assemblyName) `
            --version ([string]$mod.version) `
            --commit $env:EXPECTED_COMMIT `
            --run-id $env:EXPECTED_RUN_ID
          if ($LASTEXITCODE -ne 0) {
            throw "Candidate writer failed with exit code $LASTEXITCODE."
          }
          "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT
      - name: Upload candidate
        id: candidate
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.metadata.outputs.artifact-name }}
          path: artifacts/candidate/*
          if-no-files-found: error
          retention-days: 7
      - name: Record immutable artifact evidence
        shell: pwsh
        env:
          ARTIFACT_ID: ${{ steps.candidate.outputs.artifact-id }}
          ARTIFACT_DIGEST: ${{ steps.candidate.outputs.artifact-digest }}
        run: |
          "Artifact ID: $env:ARTIFACT_ID" >> $env:GITHUB_STEP_SUMMARY
          "Artifact digest: $env:ARTIFACT_DIGEST" >> $env:GITHUB_STEP_SUMMARY
